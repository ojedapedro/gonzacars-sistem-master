<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DevMecanicoOnline — Sistema de Gestión Integral</title>
  <meta name="description"
    content="Sistema integral de gestión para DevMecanicoOnline. Administra clientes, vehículos, inventario, ventas, finanzas y nómina.">
  <meta name="theme-color" content="#0a0f1e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="DevMecanicoOnline">
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" type="image/png" href="https://i.ibb.co/MDhy5tzK/image-2.png">
  <link rel="apple-touch-icon" href="https://i.ibb.co/MDhy5tzK/image-2.png">
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(console.error);
      });
    }
  </script>

  <!-- SheetJS -->
  <script src="https://cdn.sheetjs.com/xlsx-0.19.3/package/dist/xlsx.full.min.js"></script>

  <!-- Google Fonts: Outfit (headings) + Inter (body) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700;800;900&display=swap"
    rel="stylesheet">

  <style>
    /* Critical above-the-fold: prevent FOUC */
    html,
    body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #f1f5f9;
      color: #0f172a;
    }

    #root {
      height: 100%;
    }

    /* App-loading splash */
    #app-loader {
      position: fixed;
      inset: 0;
      background: #0a0f1e;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 1rem;
      z-index: 99999;
      transition: opacity 0.5s ease, visibility 0.5s ease;
    }

    #app-loader.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .loader-ring {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(255, 255, 255, 0.1);
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .loader-text {
      color: rgba(255, 255, 255, 0.5);
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }
  </style>
</head>

<body>
  <!-- App-loading splash screen -->
  <div id="app-loader">
    <div class="loader-ring"></div>
    <p class="loader-text">Cargando sistema…</p>
  </div>

  <!-- Toast container (managed by JS) -->
  <div id="toast-container"></div>

  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>

  <!-- Hide loader once React mounts -->
  <script>
    window.__hideLoader = function () {
      var el = document.getElementById('app-loader');
      if (el) el.classList.add('hidden');
    };
  </script>
</body>

<script type="importmap">
{
  "imports": {
    "lucide-react": "https://esm.sh/lucide-react@^0.562.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "recharts": "https://esm.sh/recharts@^3.6.0",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "@google/genai": "https://esm.sh/@google/genai@^1.34.0"
  }
}
</script>

</html>
